<!DOCTYPE html>
<html lang="pl">

  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BNK Studio X</title>

    <script type="module" src="./modules/Web-creator/Engine/main.js" defer></script>

    <link rel="stylesheet" href="./modules/Web-creator/UI-UX/css/main.css" />
  </head>

  <body>

    <header class="navbar">
        <button id="tool-btn" class="menu-toggle">⚙️ Narzędzia</button>
        <div class="logo"><img src="./base_assets/image/bitmapa.svg" alt="Logo" /></div>
        <nav class="nav-links">
            <a href="#">Zapisz</a>
            <a href="#">Wczytaj</a>
            <a href="#">Cofnij</a>
            <a href="#">Następny</a>
        </nav>
        <button id="menu-btn" class="menu-toggle">☰ Menu</button>
    </header>

    <div class="container">
        
        <aside class="left-aside">
            <h3>Ustawienia układu strony</h3>
            <div>
                <p>Ustawienia siatki:</p>
                <div class="grid-settings">
                    <input type="number" id="grid-columns" placeholder="Kolumny" min="1" />
                    <input type="number" id="grid-rows" placeholder="Wiersze" min="1" />
                    <button id="apply-grid" class="btn">Zastosuj</button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="iframe-container">
                <iframe id="app" title="Iframe Content"></iframe>
            </div>
        </main>

        <aside class="right-aside" id="rightAside">
            <h3>Narzędzia</h3>
            <div class="tool-section">
                <label for="type">Typ elementu:</label>
                <select id="type" value="">
                    <option >Nagłowek</option>
                    <option>Paragraf</option>
                    <option>Tekst</option>
                </select>
            </div>
            <div class="tool-section">
                <label for="content-input">Zawartość elementu:</label>
                <textarea id="content-input" placeholder="Wprowadź treść elementu..."></textarea>
                <label for="source_link">Link:</label>
                <input type="url" id="source_link" placeholder="Wprowadź adres URL..." />
            </div>
            <div class="tool-section">
                <label for="element-color">Kolor tekstu:</label>
                <input type="color" id="element-color" value="#000000" />
            </div>
        </aside>

      </div>
</body>
</html>
