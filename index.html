<!DOCTYPE html>
<html lang="pl">

  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kreator stron</title>

    <script type="module" src="./modules/Web-creator/Engine/main.js" defer></script>

    <link rel="stylesheet" href="./modules/Web-creator/UI-UX/css/main.css" />
  </head>

  <body>
    <header>
      <h1><span>BNK</span> Studio <span>X</span></h1>
    </header>
    <main id="main" class="main" role="main">
      <div class="left-panel-wrapper">
      <div id="left-panel" class="left-column" aria-label="tools panel">
        <button class="icon-btn" aria-label="Add component">Dodaj</button>
        <button class="icon-btn" aria-label="Show tree">Drzewko</button>
        <button class="icon-btn" aria-label="Add image">Obrazy</button>
        <button class="icon-btn" aria-label="Save">Zapisz</button>
        <button class="icon-btn" aria-label="Publish">Publikuj</button>
      </div>
      </div>

        <div class="iframe-wrapper">
          <iframe id="iframe" src="./modules/Web-creator/Created_website/template.html" title="Podgląd strony"></iframe>
        </div>

      <div id="right-panel" class="panel right-panel" aria-label="Properties panel">
        <button class="" aria-label="Close properties panel"><span class="crossed_1"></span><span class="crossed_2"></span></button>
        <div class="panel-inner">
            <h2 class="panel-title">Właściwości</h2>
            <p class="panel-description">Edytuj właściwości wybranego elementu</p>
        </div>
        <div class="panel-inner">
            <label for="el_name">Nazwa elementu</label>
            <input type="text" id="el_name" name="el_name" placeholder="Nazwa elementu" />
      </div>
      <div class="panel-style">
      </div>

    </main>

  </body>

</html>
